                { q: "What should the rest seat be wider at?", o: ["The center of the tooth", "The marginal ridge", "The gingival margin", "The root"], a: 1, e: "The rest seat should be wider at the marginal ridge than at the center of the tooth." },
                { q: "Why must the rest not raise the vertical dimension of occlusion (VDO)?", o: ["Because it looks better", "Because raising VDO can cause TMJ pain and muscle problems", "Because it is cheaper", "Because it is easier to make"], a: 1, e: "The rest must not raise the vertical dimension of occlusion; otherwise, it can cause TMJ pain and muscle problems." }
            ]},
            { id: 11, title: "Direct Retainers & Clasp Assemblies", questions: [
                { q: "What is a direct retainer?", o: ["A component that provides support only", "A component used to retain and prevent dislodgment of the RPD", "The major connector", "The denture base"], a: 1, e: "A direct retainer is defined as that component of a partial removable dental prosthesis used to retain and prevent dislodgment." },
                { q: "What does a direct retainer consist of?", o: ["Major connector only", "Clasp assembly or precision attachment", "Denture base only", "Artificial teeth only"], a: 1, e: "A direct retainer consists of a clasp assembly or precision attachment." },
                { q: "What is a clasp assembly?", o: ["The part that replaces teeth", "The part that acts as direct retainer and/or stabilizer by partially encompassing an abutment tooth", "The major connector", "The denture base"], a: 1, e: "A clasp assembly is the part of an RPD that acts as direct retainer and/or stabilizer by partially encompassing or contacting an abutment tooth." },
                { q: "What are the components of a clasp assembly?", o: ["Major connector and denture base", "Minor connector, rest, retentive clasp arm, and non-retentive (reciprocal) clasp arm", "Artificial teeth only", "Major connector only"], a: 1, e: "Components of a clasp assembly include minor connector, rest, retentive clasp arm, and non-retentive clasp arm." },
                { q: "Which part of the clasp assembly is flexible?", o: ["Minor connector", "Rest", "Bracing (reciprocal) arm", "Retentive tip of the retentive arm"], a: 3, e: "The retentive tip of the retentive arm is flexible; all other parts (minor connector, rest, bracing arm) are rigid." },
                { q: "What is the function of the reciprocal (bracing) arm?", o: ["Retention", "Reciprocation and stabilization", "Support", "Major connection"], a: 1, e: "The non-retentive (reciprocal or bracing) arm provides reciprocation and stabilization." },
                { q: "Where should the retentive tip be placed on the abutment tooth?", o: ["Occlusal third", "Middle third", "Gingival third (in an undercut area)", "Incisal edge"], a: 2, e: "The retentive clasp arm is placed in the gingival third of the crown in an undercut area." },
                { q: "Where should the reciprocal (bracing) arm contact the tooth?", o: ["In the gingival third (undercut)", "In the middle third (above the survey line)", "On the occlusal surface", "On the root"], a: 1, e: "The non-retentive arm (reciprocal) is placed in the middle third of the crown (above the survey line)." },
                { q: "What is the survey line (height of contour)?", o: ["The lowest point on the tooth", "The highest point of height or contour on the tooth", "The root tip", "The gingival margin"], a: 1, e: "The survey line or height of contour is the highest point of height or contour on the tooth." },
                { q: "What is the principle of \"passivity\" in clasp design?", o: ["The clasp applies constant force to the tooth", "The clasp applies zero force to the tooth when the denture is fully seated", "The clasp is always flexible", "The clasp is always rigid"], a: 1, e: "Passivity means that when the RPD is seated in place, the clasp applies zero force to the tooth." },
                { q: "What is the principle of \"reciprocity\"?", o: ["The clasp bends easily", "The reciprocal arm supports the tooth from the opposite side when the retentive tip engages the undercut", "The clasp has no function", "The clasp is made of acrylic"], a: 1, e: "Reciprocity means the reciprocal arm supports the tooth from the opposite side to prevent tooth movement when the retentive tip engages the undercut." },
                { q: "How many degrees of tooth circumference should a clasp encircle?", o: ["Less than 90 degrees", "More than 180 degrees (adequate encirclement)", "Exactly 360 degrees", "No encirclement needed"], a: 1, e: "Adequate encirclement means the clasp must cover more than 180 degrees of the tooth." },
                { q: "What is the recommended distance from the clasp to the gingiva?", o: ["0.5 mm", "1.5 mm or more (hygienic requirement)", "3 mm", "5 mm"], a: 1, e: "The hygienic requirement is that the distance from the clasp to the gingiva should be more than 1.5 mm." },
                { q: "Which tooth is considered almost useless for clasping?", o: ["Upper first molar", "Lower incisors and upper laterals", "Upper canine", "Lower first premolar"], a: 1, e: "Upper laterals and all lower incisors are almost useless for clasping." },
                { q: "What is the clasping order (best to worst)?", o: ["Incisors, canines, premolars, molars", "Molars, premolars, canines, upper central incisors", "Canines only", "All teeth are equal"], a: 1, e: "The clasping order is: 1. Molars, 2. Premolars, 3. Canines, 4. Upper central incisors." },
                { q: "If a denture rocks about a line, what should you do?", o: ["Remove a clasp", "Add a third clasp", "Reduce the denture base", "Ignore it"], a: 1, e: "If the denture rocks about a line, add a third clasp to prevent rotation." },
                { q: "What is a \"suprabulge\" clasp?", o: ["A clasp that approaches the undercut from the gingival direction", "A clasp that approaches the undercut from the occlusal direction (above the height of contour)", "A clasp that never touches the tooth", "A clasp made of acrylic"], a: 1, e: "A suprabulge clasp approaches the retentive undercut from an occlusal or suprabulge direction (from above)." },
                { q: "What is an \"infrabulge\" clasp?", o: ["A clasp that approaches the undercut from the occlusal direction", "A clasp that approaches the undercut from the gingival direction (from below)", "A clasp that does not engage the undercut", "A clasp made of porcelain"], a: 1, e: "An infrabulge clasp approaches the undercut from the gingival direction (below the height of contour)." },
                { q: "What is the difference between a cast clasp and a wrought wire clasp regarding flexibility?", o: ["Cast is more flexible than wrought wire", "Wrought wire is more flexible than cast", "Both are equally flexible", "Neither is flexible"], a: 1, e: "Wrought wire clasps are more flexible than cast clasps because of their material properties." },
                { q: "What happens if the undercut is very deep?", o: ["The clasp must be more rigid", "The clasp must be more flexible", "The clasp must be shorter", "The clasp must be thicker"], a: 1, e: "If the undercut is deep, the clasp needs to be more flexible to engage and disengage without damaging the tooth or clasp." }
            ]},
            { id: 12, title: "Types of Clasps (Part 1 - Suprabulge)", questions: [
                { q: "The Aker clasp is also known as:", o: ["Infrabulge clasp", "Circumferential clasp (occlusally approaching)", "Bar clasp", "I-bar clasp"], a: 1, e: "The Aker clasp is also called the circumferential clasp or occlusally approaching clasp." },
                { q: "What is the typical design of an Aker clasp?", o: ["A rest with cast retentive and reciprocal clasps arising from it", "A wrought wire only", "An acrylic arm only", "No rest is needed"], a: 0, e: "The typical Aker clasp has a rest with cast retentive and reciprocal clasps arising from it." },
                { q: "Which variation of the Aker clasp is used when there is a diastema or large embrasure between two adjacent teeth?", o: ["Half and half clasp", "Double Aker clasp", "C-clasp", "Ring clasp"], a: 1, e: "The double Aker clasp is used when there are two adjacent abutments with a diastema or large embrasure." },
                { q: "What is a \"Half and Half\" clasp?", o: ["A clasp made of two materials", "A variation of the Aker clasp where half comes from one direction and half from another", "A clasp that only covers half the tooth", "A clasp that is half metal, half acrylic"], a: 1, e: "The half and half clasp is a variation of the Aker clasp." },
                { q: "What is a \"C-clasp\"?", o: ["A clasp shaped like the letter C", "A clasp made of carbon", "A clasp for canines only", "A clasp that is completely circular"], a: 0, e: "The C-clasp is named for its shape resembling the letter C." },
                { q: "The Ring clasp is indicated for which type of tooth?", o: ["Anterior teeth", "Isolated molars", "Lower incisors", "Upper laterals"], a: 1, e: "The ring clasp is always used for isolated molars." },
                { q: "The Back Action clasp is used when:", o: ["The undercut is on the mesial side near the rest", "The undercut is on the distal side far from the rest", "The tooth is perfectly straight", "Esthetics is the only concern"], a: 1, e: "The back action clasp is used when the undercut is on the distal side, far from the rest." },
                { q: "The Reverse Back Action clasp is often used in which type of case?", o: ["Class III bounded saddles", "Class I and II free-end saddles (mandibular molars)", "Anterior cases", "Maxillary incisors"], a: 1, e: "The reverse back action clasp is often used in free-end saddle cases (Class I and II) to reduce stress on the abutment." },
                { q: "What is an Extended clasp (Long distance clasp)?", o: ["A clasp that covers only one tooth", "A clasp whose body extends across more than one tooth before engaging an undercut", "A clasp that is very short", "A clasp that never touches the tooth"], a: 1, e: "An extended clasp extends across the buccal or lingual surface of more than one tooth before engaging an undercut." },
                { q: "When is an Extended clasp indicated?", o: ["When the abutment adjacent to the saddle has a perfect undercut", "When the abutment adjacent to the saddle has no undercut or a poor survey line", "When all teeth are present", "When the patient is young"], a: 1, e: "An extended clasp is used when the tooth adjacent to the saddle has no undercut or a poor survey line." },
                { q: "What is the purpose of a Reverse Aker clasp?", o: ["To increase retention", "To reduce stress on the abutment tooth in free-end saddle cases", "To improve esthetics", "To make the clasp more flexible"], a: 1, e: "The reverse Aker clasp is used in free-end saddle cases to reduce stress on the abutment tooth." },
                { q: "Which of the following is a variation of the Aker clasp?", o: ["I-bar", "T-bar", "Multiple Aker clasp", "Roach clasp"], a: 2, e: "Multiple Aker clasp is a variation of the suprabulge Aker clasp." },
                { q: "What is the main advantage of an Aker clasp?", o: ["Superior esthetics", "Excellent bracing, support, and retention", "Minimum tooth contact", "Very flexible"], a: 1, e: "The Aker clasp provides excellent bracing, support, and retention because it has a rigid reciprocal arm." },
                { q: "What is the shape of a C-clasp?", o: ["Straight line", "Semi-circular (like the letter C)", "Full circle", "Zigzag"], a: 1, e: "The C-clasp is named for its semi-circular shape resembling the letter C." },
                { q: "A Ring clasp encircles the tooth by approximately:", o: ["90 degrees", "180 degrees", "270-360 degrees (almost completely)", "45 degrees"], a: 2, e: "A ring clasp almost completely encircles the tooth (up to 360 degrees)." },
                { q: "What is the main indication for a Back Action clasp?", o: ["Maxillary anterior teeth", "Mandibular molars with distal undercut far from the rest", "Lower incisors", "Upper laterals"], a: 1, e: "The back action clasp is used when the undercut is on the distal side of a mandibular molar, far from the rest." },
                { q: "What is a \"Half and Half\" clasp?", o: ["Half metal, half acrylic", "Half rigid, half flexible", "A clasp where the retentive arm comes from one direction and the reciprocal from another", "A clasp that only covers half the tooth"], a: 2, e: "The half and half clasp is a variation where the retentive and reciprocal arms come from different directions." },
                { q: "Which clasp is best for an isolated mandibular molar with undercuts on both mesial and distal?", o: ["Aker clasp", "Ring clasp", "I-bar", "Half and half"], a: 1, e: "The ring clasp is indicated for isolated molars because it can engage undercuts on multiple surfaces." },
                { q: "What does the \"Multiple Aker clasp\" provide?", o: ["Less stability", "Increased stability and retention by using multiple rests and clasps", "Poor retention", "No support"], a: 1, e: "The multiple Aker clasp uses multiple rests and clasp arms to increase stability and retention." },
                { q: "In a Reverse Aker clasp, where does the minor connector originate?", o: ["From the saddle area (away from the edentulous space)", "From the distal of the tooth", "From the same place as a regular Aker", "From the gingiva"], a: 0, e: "In a reverse Aker clasp, the minor connector originates from a different location (often from the saddle area) to change the direction of force." }
            ]},
        ];

        const essayData = [
            { q: "1. Function of master cast", a: "The master cast is used for:\n- Fabrication of the framework (wax pattern, casting, finishing)\n- Beading of the cast\n- Blocking out undesirable undercuts\n- Relief area building for acrylic resin base\n- Duplication to create the refractory cast\n\nEvidence: Under 'Master Cast Procedures (Laboratory Phase – Full)', the master cast is used for pouring, surveying, drawing the design, beading, waxing and blocking out undercuts, ledge formation, retainer areas preparation, relief areas building, and duplication." },
            { q: "2. State Applegate's rules related to the third molar", a: "Applegate's Rules related to the third molar are:\n\nRule 2: If the third molar is missing and not to be replaced, it is NOT considered in the classification.\n\nRule 3: If a third molar is present and is to be used as an abutment, it IS considered in the classification.\n\nEvidence: Under 'Applegate's Rules' - Rule 2 and Rule 3 clearly state these conditions for the third molar." },
            { q: "3. Define & mention the advantages of study cast", a: "Definition: A study cast is a diagnostic cast poured from a preliminary impression (usually alginate) used for treatment planning and analysis before constructing the final prosthesis.\n\nAdvantages (Functions) of study cast:\n- Viewing the occlusion from the lingual aspect\n- Studying the inter-arch space available for artificial teeth\n- Detecting occlusal interferences that need correction\n- Detecting over-erupted and migrated teeth\n- Evaluating the space available for the denture base\n- Determining the spaces available for rest seat preparation\n- Explaining the condition to the patient\n- Using the study cast as a document for case progress\n\nEvidence: Under 'Procedures After Primary Impression' and 'Functions of the Study Cast'." },
            { q: "4. Why do we prefer NOT to use a unilateral partial denture? (2 reasons)", a: "Unilateral partial dentures are generally not preferred because:\n\n1. Lack of cross-arch stabilization: They do not provide bilateral stabilization, support, and retention across the arch.\n\n2. Increased risk of tissue damage: They may act as a 'gum stripper' because they lack the stability provided by connecting to the other side of the arch, leading to tissue trauma and food trapping.\n\nNote: The text emphasizes the need for bilateral stabilization, support, and retention. Also, a partial denture without proper support (occlusal rests) is called a 'gum stripper'." },
            { q: "5. Which denture base material is suitable for Class IV?", a: "For Kennedy Class IV (anterior edentulous area crossing the midline), the most suitable denture base material is:\n\nAcrylic or Combination (Metal + Acrylic)\n\nReasoning: Class IV is an anterior esthetic zone, so acrylic provides good esthetics. Acrylic is lightweight and can be easily relined. If long-span, a combination base (metal framework with acrylic facing) provides strength and esthetics.\n\nEvidence: Under 'Types of Denture Base Materials' and 'Combination Denture (Base Metal + Acrylic)' indications." },
            { q: "6. Indications of Removable Partial Denture (RPD)", a: "Indications of RPD include:\n\n1. No abutment posterior to the edentulous space (free-end saddle)\n2. After recent extraction (to improve esthetics during healing)\n3. Long span edentulous areas where fixed bridge cannot be used\n4. Need for bilateral stabilization, support, and retention\n5. Esthetic requirement in the anterior region (using translucent artificial teeth)\n6. Excessive loss of residual bone (requires labial flange)\n7. Young patients (less than 17 years old)\n8. Immediate replacement of missing teeth\n9. Economic considerations (lower cost than fixed prosthesis)\n\nEvidence: Under 'Indications of Removable Partial Denture (R.P.D)'." },
            { q: "7. Uses of the study cast", a: "The uses (functions) of the study cast are:\n\n1. Viewing occlusion from the lingual aspect\n2. Studying inter-arch space available for artificial teeth\n3. Detecting occlusal interferences needing correction\n4. Detecting over-erupted and migrated teeth\n5. Evaluating space available for the denture base\n6. Determining spaces available for rest seat preparation\n7. Explaining the condition to the patient\n8. Using as a document for case progress\n\nEvidence: Under 'Functions of the Study Cast'." },
            { q: "8. Objectives of Removable Partial Denture (RPD)", a: "The objectives of RPD are:\n\n1. Preservation of Remaining Teeth and Tissues:\n- Preservation of remaining teeth\n- Prevention of muscle and TMJ problems\n- Preservation of residual ridge\n- Preservation of tongue contour and space\n\n2. Improve Masticatory Function (by restoring continuity of the dental arch)\n\n3. Improvement of Esthetics (providing support to lips and cheeks)\n\n4. Enhance Psychological Comfort\n\n5. Restoration of Impaired Speech (dentolabial sounds F, V)\n\nEvidence: Under 'Objectives of RPD'." }
        ];

        // --- APPLICATION LOGIC ---

        const app = {
            state: {
                currentLessonId: null,
                currentQuestionIndex: 0,
                answers: {},
                score: 0
            },
            timerInterval: null,
            timeLeft: 60, // 1 Minute as requested

            init() {
                this.loadProgress();
                this.renderLanding();
                this.updateScore();
            },

            saveProgress() {
                localStorage.setItem('dentaFrameState', JSON.stringify(this.state));
            },

            loadProgress() {
                const saved = localStorage.getItem('dentaFrameState');
                if (saved) this.state = JSON.parse(saved);
            },

            renderLanding() {
                // Render Lessons
                const lessonContainer = document.getElementById('lessons-grid');
                lessonContainer.innerHTML = '';
                lessonData.forEach(lesson => {
                    // Calculate progress
                    const total = lesson.questions.length;
                    let answered = 0;
                    lesson.questions.forEach(q => {
                        if (this.state.answers[`l${lesson.id}_q${q.q}`] !== undefined) answered++;
                    });

                    const isCompleted = answered === total;
                    const progressText = isCompleted ? "Completed" : `${answered}/${total}`;
                    const statusClass = isCompleted ? "active" : "";

                    const card = document.createElement('div');
                    card.className = 'lesson-card';
                    card.onclick = () => this.startLesson(lesson.id);
                    card.innerHTML = `
                        <div class="card-header">
                            <div class="card-icon">${lesson.id}</div>
                            <div class="card-title">${lesson.title}</div>
                        </div>
                        <div class="card-footer">
                            <span>Progress</span>
                            <div style="display:flex; align-items:center; gap:5px;">
                                ${progressText} 
                                <div class="status-dot ${statusClass}"></div>
                            </div>
                        </div>
                    `;
                    lessonContainer.appendChild(card);
                });

                // Render Essays
                const essayContainer = document.getElementById('essays-grid');
                essayContainer.innerHTML = '';
                essayData.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'essay-card';
                    div.innerHTML = `
                        <div class="essay-q">${item.q}</div>
                        <button class="toggle-btn" onclick="app.toggleEssay(this)">Show Answer</button>
                        <div class="essay-ans">${item.a}</div>
                    `;
                    essayContainer.appendChild(div);
                });
            },

            toggleEssay(btn) {
                const ans = btn.nextElementSibling;
                if (ans.classList.contains('show')) {
                    ans.classList.remove('show');
                    btn.textContent = "Show Answer";
                } else {
                    ans.classList.add('show');
                    btn.textContent = "Hide Answer";
                }
            },

            startLesson(id) {
                this.state.currentLessonId = id;
                this.state.currentQuestionIndex = 0;
                
                document.getElementById('landing-view').style.display = 'none';
                document.getElementById('quiz-view').style.display = 'block';
                document.getElementById('global-stats').style.display = 'flex';
                
                this.renderQuestion();
                window.scrollTo(0, 0);
            },

            exitQuiz() {
                clearInterval(this.timerInterval);
                document.getElementById('quiz-view').style.display = 'none';
                document.getElementById('landing-view').style.display = 'block';
                document.getElementById('global-stats').style.display = 'none';
                this.renderLanding(); // Refresh progress on cards
            },

            renderQuestion() {
                const lesson = lessonData.find(l => l.id === this.state.currentLessonId);
                if (!lesson) return;

                const qData = lesson.questions[this.state.currentQuestionIndex];
                const qId = `l${lesson.id}_q${qData.q}`;

                // Update UI Text
                document.getElementById('q-lesson-id').textContent = lesson.id;
                document.getElementById('q-counter').textContent = `Question ${this.state.currentQuestionIndex + 1} / ${lesson.questions.length}`;
                document.getElementById('q-text').textContent = qData.q;

                // Render Options
                const container = document.getElementById('options-container');
                container.innerHTML = '';
                const savedAnswer = this.state.answers[qId];
                const isAnswered = savedAnswer !== undefined;

                const letters = ['A', 'B', 'C', 'D'];
                qData.o.forEach((opt, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    
                    const circle = document.createElement('div');
                    circle.className = 'option-circle';
                    circle.textContent = letters[idx];
                    
                    const text = document.createElement('span');
                    text.textContent = opt;

                    btn.appendChild(circle);
                    btn.appendChild(text);

                    if (isAnswered) {
                        btn.disabled = true;
                        if (idx === qData.a) btn.classList.add('correct');
                        else if (idx === savedAnswer) btn.classList.add('wrong');
                    } else {
                        btn.onclick = () => this.handleAnswer(qId, idx, qData.a, qData.e);
                    }
                    container.appendChild(btn);
                });

                // Evidence
                const evBox = document.getElementById('evidence-box');
                if (isAnswered) {
                    evBox.classList.add('show');
                    document.getElementById('evidence-text').textContent = qData.e;
                } else {
                    evBox.classList.remove('show');
                    this.startTimer();
                }

                this.renderDots(lesson);
                
                // Buttons
                document.getElementById('prev-btn').disabled = this.state.currentQuestionIndex === 0;
                const isLast = this.state.currentQuestionIndex === lesson.questions.length - 1;
                document.getElementById('next-btn').textContent = isLast ? "Finish" : "Next";
            },

            renderDots(lesson) {
                const nav = document.getElementById('dots-nav');
                nav.innerHTML = '';
                lesson.questions.forEach((_, idx) => {
                    const dot = document.createElement('div');
                    dot.className = `dot ${idx === this.state.currentQuestionIndex ? 'active' : ''}`;
                    const qId = `l${lesson.id}_q${lesson.questions[idx].q}`;
                    if (this.state.answers[qId] !== undefined) dot.classList.add('done');
                    dot.textContent = idx + 1;
                    dot.onclick = () => {
                        this.state.currentQuestionIndex = idx;
                        this.renderQuestion();
                        this.saveProgress();
                    };
                    nav.appendChild(dot);
                });
            },

            handleAnswer(qId, selectedIdx, correctIdx, evidence) {
                clearInterval(this.timerInterval);
                this.state.answers[qId] = selectedIdx;
                if (selectedIdx === correctIdx) {
                    this.state.score++;
                    this.updateScore();
                }
                this.saveProgress();

                // Visual Feedback
                const options = document.querySelectorAll('.option-btn');
                options.forEach((btn, idx) => {
                    btn.disabled = true;
                    if (idx === correctIdx) btn.classList.add('correct');
                    else if (idx === selectedIdx) btn.classList.add('wrong');
                });

                // Show Evidence
                const evBox = document.getElementById('evidence-box');
                evBox.classList.add('show');
                document.getElementById('evidence-text').textContent = evidence;
                
                this.renderDots(lessonData.find(l => l.id === this.state.currentLessonId));
            },

            startTimer() {
                clearInterval(this.timerInterval);
                this.timeLeft = 60;
                this.updateTimerDisplay();
                this.timerInterval = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimerDisplay();
                    if (this.timeLeft <= 0) this.handleTimeOut();
                }, 1000);
            },

            updateTimerDisplay() {
                const min = Math.floor(this.timeLeft / 60);
                const sec = this.timeLeft % 60;
                document.getElementById('timer-display').textContent = `${min < 10 ? '0'+min : min}:${sec < 10 ? '0'+sec : sec}`;
            },

            handleTimeOut() {
                clearInterval(this.timerInterval);
                const lesson = lessonData.find(l => l.id === this.state.currentLessonId);
                const qData = lesson.questions[this.state.currentQuestionIndex];
                const qId = `l${lesson.id}_q${qData.q}`;
                
                this.state.answers[qId] = -1; // Mark as wrong/timeout
                this.saveProgress();

                document.getElementById('modal-title').textContent = "Time's Up!";
                document.getElementById('modal-msg').textContent = "The correct answer has been highlighted.";
                document.getElementById('modal-overlay').style.display = 'flex';

                // Show correct answer
                const options = document.querySelectorAll('.option-btn');
                options[qData.a].classList.add('correct');
                
                // Show Evidence
                const evBox = document.getElementById('evidence-box');
                evBox.classList.add('show');
                document.getElementById('evidence-text').textContent = qData.e;
            },

            nextQuestion() {
                clearInterval(this.timerInterval);
                const lesson = lessonData.find(l => l.id === this.state.currentLessonId);
                if (this.state.currentQuestionIndex < lesson.questions.length - 1) {
                    this.state.currentQuestionIndex++;
                    this.renderQuestion();
                    this.saveProgress();
                } else {
                    // Lesson Finished
                    alert("Lesson Completed!");
                    this.exitQuiz();
                }
            },

            prevQuestion() {
                clearInterval(this.timerInterval);
                if (this.state.currentQuestionIndex > 0) {
                    this.state.currentQuestionIndex--;
                    this.renderQuestion();
                    this.saveProgress();
                }
            },

            updateScore() {
                document.getElementById('score-display').textContent = this.state.score;
            },

            closeModal() {
                document.getElementById('modal-overlay').style.display = 'none';
                this.nextQuestion();
            }
        };

        window.onload = () => app.init();

    </script>
</body>
</html>
