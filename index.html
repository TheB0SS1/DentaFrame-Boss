<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DentaFrame Boss | Professional Prosthodontics</title>
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #2563EB;       /* Royal Blue */
            --primary-hover: #1D4ED8;
            --secondary: #60A5FA;     /* Light Blue */
            --bg-color: #F3F4F6;      /* Light Gray Background */
            --card-bg: #FFFFFF;       /* White */
            --text-main: #1F2937;     /* Dark Gray */
            --text-light: #6B7280;    /* Medium Gray */
            --success: #10B981;       /* Green */
            --danger: #EF4444;        /* Red */
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --radius: 16px;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            background: #fff;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.5px;
        }
        
        .logo span { color: var(--text-main); font-weight: 400; }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            background: #EFF6FF;
            padding: 8px 16px;
            border-radius: 50px;
        }

        .timer-box { color: var(--primary); font-family: monospace; font-size: 1.1rem; }

        /* --- MAIN CONTAINER --- */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* --- LANDING PAGE (CARDS) --- */
        .hero-section {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        .hero-title {
            font-size: 2.5rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .hero-subtitle {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-main);
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            font-weight: 700;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 3rem;
        }

        .lesson-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        .lesson-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: var(--secondary);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .card-icon {
            width: 40px;
            height: 40px;
            background: #EFF6FF;
            color: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.3;
        }

        .card-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f3f4f6;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #D1D5DB;
        }
        .status-dot.active { background: var(--success); box-shadow: 0 0 8px var(--success); }

        /* --- ESSAY CARDS --- */
        .essay-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
            border-left: 4px solid var(--secondary);
        }

        .essay-q { font-weight: 600; font-size: 1.05rem; margin-bottom: 10px; color: var(--text-main); }
        
        .toggle-btn {
            background: #EFF6FF;
            color: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .toggle-btn:hover { background: #DBEAFE; }

        .essay-ans {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            color: #374151;
            line-height: 1.7;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .essay-ans.show { display: block; animation: slideDown 0.3s ease; }

        /* --- QUIZ PAGE --- */
        #quiz-view { display: none; animation: fadeIn 0.4s ease; }
        
        .quiz-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #F3F4F6;
        }

        .question-text {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .option-btn {
            padding: 18px 20px;
            background: #fff;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            text-align: left;
            font-size: 1rem;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .option-btn:hover:not(:disabled) { border-color: var(--secondary); background: #EFF6FF; }
        .option-btn:disabled { cursor: not-allowed; }

        .option-circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid #D1D5DB;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* Correct/Wrong States */
        .option-btn.correct { border-color: var(--success); background: #ECFDF5; }
        .option-btn.correct .option-circle { background: var(--success); border-color: var(--success); color: white; }
        
        .option-btn.wrong { border-color: var(--danger); background: #FEF2F2; }
        .option-btn.wrong .option-circle { background: var(--danger); border-color: var(--danger); color: white; }

        /* Evidence Box */
        .evidence-box {
            margin-top: 2rem;
            padding: 1.2rem;
            background: #EFF6FF;
            border-left: 4px solid var(--primary);
            border-radius: 8px;
            display: none;
        }
        .evidence-box.show { display: block; animation: slideDown 0.3s ease; }
        .evidence-label { font-weight: 700; color: var(--primary); font-size: 0.9rem; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        .evidence-content { color: #374151; line-height: 1.6; font-size: 0.95rem; }

        /* Navigation */
        .nav-controls {
            margin-top: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1.5rem;
            border-top: 1px solid #F3F4F6;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-secondary { background: #E5E7EB; color: var(--text-main); }
        .btn-secondary:hover { background: #D1D5DB; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .dots-nav { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .dot {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: #F3F4F6;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; font-weight: 600; color: var(--text-light);
            cursor: pointer; transition: 0.2s;
        }
        .dot:hover { background: #E5E7EB; }
        .dot.active { background: var(--primary); color: white; }
        .dot.done { background: var(--success); color: white; }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: white; padding: 30px; border-radius: var(--radius);
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            animation: scaleIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal h2 { color: var(--text-main); margin-bottom: 10px; }
        .modal p { color: var(--text-light); margin-bottom: 20px; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            header { padding: 1rem; }
            .logo { font-size: 1.2rem; }
            .hero-title { font-size: 1.8rem; }
            .grid-container { grid-template-columns: 1fr; }
            .nav-controls { flex-direction: column; gap: 15px; }
            .btn { width: 100%; }
            .dots-nav { order: -1; }
            .option-btn { padding: 15px; align-items: center; }
        }

    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary)"><path d="M4.5 12.5C4.5 12.5 4.5 8 12 8c7.5 0 7.5 4.5 7.5 4.5v4.5H4.5v-4.5z"></path><path d="M12 8V2"></path><path d="M9 22h6"></path><path d="M8 18h8"></path></svg>
            DentaFrame <span>Boss</span>
        </div>
        <div class="header-stats" id="global-stats" style="display:none;">
            <span class="timer-box" id="timer-display">01:00</span>
            <span>Score: <strong id="score-display">0</strong></span>
        </div>
    </header>

    <main>
        <!-- LANDING PAGE VIEW -->
        <div id="landing-view">
            <div class="hero-section">
                <h1 class="hero-title">Master Prosthodontics</h1>
                <p class="hero-subtitle">Select a lesson to begin your professional assessment.</p>
            </div>

            <h2 class="section-title">Lessons</h2>
            <div class="grid-container" id="lessons-grid">
                <!-- Lesson Cards Injected Here -->
            </div>

            <h2 class="section-title">Essay Review</h2>
            <div id="essays-grid">
                <!-- Essay Cards Injected Here -->
            </div>
        </div>

        <!-- QUIZ PAGE VIEW -->
        <div id="quiz-view">
            <div class="quiz-container">
                <div class="quiz-header">
                    <div>
                        <span style="color:var(--text-light); font-size:0.9rem; font-weight:600;">Lesson <span id="q-lesson-id">1</span></span>
                        <div style="font-size:1.1rem; font-weight:700; color:var(--text-main);" id="q-counter">Question 1/20</div>
                    </div>
                    <button class="btn btn-secondary" onclick="app.exitQuiz()" style="padding: 8px 16px; font-size:0.85rem;">Exit</button>
                </div>

                <div class="question-text" id="q-text">
                    Loading question...
                </div>

                <div class="options-grid" id="options-container">
                    <!-- Options -->
                </div>

                <div class="evidence-box" id="evidence-box">
                    <span class="evidence-label">Evidence</span>
                    <div class="evidence-content" id="evidence-text"></div>
                </div>

                <div class="nav-controls">
                    <button class="btn btn-secondary" id="prev-btn" onclick="app.prevQuestion()">Previous</button>
                    
                    <div class="dots-nav" id="dots-nav">
                        <!-- Dots -->
                    </div>

                    <button class="btn btn-primary" id="next-btn" onclick="app.nextQuestion()">Next</button>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Time's Up!</h2>
            <p id="modal-msg">The correct answer was highlighted.</p>
            <button class="btn btn-primary" onclick="app.closeModal()">Continue</button>
        </div>
    </div>

    <script>
        // --- DATA: 260 Questions + 8 Essays ---
        
        const lessonData = [
            { id: 1, title: "Introduction to Prosthodontics & Basic Terminology", questions: [
                { q: "What is the art and science of artificial replacement of any absent parts of the human body?", o: ["Orthodontics", "Prosthetics", "Periodontics", "Endodontics"], a: 1, e: "Prosthetics is defined as the art and science of artificial replacement of any absent parts of the human body." },
                { q: "Which branch of dentistry deals with replacement of missing teeth and oral tissues to restore form, function, appearance, and health?", o: ["Oral Surgery", "Prosthodontics", "Orthodontics", "Pediatric Dentistry"], a: 1, e: "Dental Prosthetics (Prosthodontics) is the branch that deals with replacement of missing teeth and oral tissues." },
                { q: "An artificial appliance that replaces one or more teeth and associated dental/alveolar structures is called:", o: ["A filling", "A crown", "A dental prosthesis", "An implant abutment"], a: 2, e: "A dental prosthesis is an artificial appliance that replaces one or more teeth and associated dental/alveolar structures." },
                { q: "Which basic prosthodontic principle is defined as the ability to resist dislodging forces along the path of placement?", o: ["Support", "Stability", "Retention", "Extension"], a: 2, e: "Retention is the ability of the prosthesis to resist dislodging forces along the path of placement." },
                { q: "The ability of a prosthesis to resist vertical tissue-ward forces is called:", o: ["Retention", "Support", "Stability", "Balance"], a: 1, e: "Support is the ability of the prosthesis to resist vertical tissue-ward forces." },
                { q: "What does the principle of \"stability\" resist?", o: ["Only vertical forces", "Dislodging forces along the path of placement", "Horizontal or rotational forces", "Only occlusal forces"], a: 2, e: "Stability is the ability of the prosthesis to resist displacement by horizontal or rotational forces." },
                { q: "A patient who has a complete set of natural teeth is called:", o: ["Edentulous", "Dentulous", "Partially edentulous", "Prosthetic"], a: 1, e: "A dentulous patient is defined as a patient having a complete set of natural teeth." },
                { q: "A patient missing all natural teeth needs which type of prosthesis?", o: ["Removable partial denture", "Fixed partial denture", "Complete denture", "Implant crown"], a: 2, e: "An edentulous patient (missing all natural teeth) needs a complete denture." },
                { q: "A patient missing one or more but not all natural teeth needs:", o: ["Complete denture only", "Removable partial denture, fixed bridge, or implant", "Orthodontic appliance only", "Surgical splint only"], a: 1, e: "A partially edentulous patient needs RPD, fixed bridge, or implant." },
                { q: "Which of the following is classified as a FIXED prosthesis?", o: ["Complete denture", "Removable partial denture", "Interim partial denture", "Fixed partial denture (bridge)"], a: 3, e: "Under Classification of Prosthesis, Fixed includes Crowns, Onlays, and Fixed Partial Dentures (Bridges)." },
                { q: "According to DeVan (1952), what has priority over replacement of that which is lost?", o: ["Esthetics", "Function", "Preservation of that which remains", "Patient comfort"], a: 2, e: "DeVan's principle states: Preservation of that which remains has priority over replacement of that which has been lost." },
                { q: "A clasp is also referred to as:", o: ["An intra-coronal retainer", "An extra-coronal retainer", "A major connector", "A denture base"], a: 1, e: "Retainer = Extra-coronal retainer = Clasp = Flexible clasp." },
                { q: "Which type of prosthesis is designed to be removed by the wearer?", o: ["Fixed bridge", "Implant", "Removable prosthesis", "Crown"], a: 2, e: "Removable Prosthodontics is defined as a prosthesis designed to be removed by the wearer." },
                { q: "An artificial replacement for a missing leg is an example of:", o: ["Dental prosthesis", "Prosthetics", "Prosthesis", "Orthosis"], a: 2, e: "Prosthesis is defined as an artificial appliance that replaces any missing part of the human body, e.g., eye prosthesis, leg prosthesis." },
                { q: "What is the primary function of a dental prosthesis?", o: ["To whiten teeth", "To replace missing teeth and restore function", "To clean teeth", "To prevent all cavities"], a: 1, e: "A dental prosthesis replaces one or more teeth to restore and maintain oral form, function, appearance, and health." },
                { q: "A patient with no teeth in the maxilla but all teeth present in the mandible is:", o: ["Completely edentulous", "Partially edentulous in the maxilla", "Dentulous in both arches", "Completely dentulous"], a: 1, e: "A partially edentulous patient is missing one or more but not all natural teeth (in either arch)." },
                { q: "Which of the following is NOT a basic prosthodontic principle?", o: ["Retention", "Support", "Stability", "Mastication"], a: 3, e: "The three basic prosthodontic principles are Retention, Support, and Stability." },
                { q: "A patient who has all teeth missing in both the maxilla and mandible is called:", o: ["Dentulous", "Partially edentulous", "Completely edentulous", "Pre-dentulous"], a: 2, e: "An edentulous patient is defined as a patient missing all natural teeth (needs complete denture)." },
                { q: "The term \"prosthesis\" can apply to all of the following EXCEPT:", o: ["Eye prosthesis", "Leg prosthesis", "Dental filling", "Dental prosthesis"], a: 2, e: "A prosthesis replaces a missing body part; a filling restores an existing tooth and is not a prosthesis." },
                { q: "What is the main difference between removable and fixed prostheses?", o: ["The material used", "Who can remove them (patient vs. dentist only)", "The cost", "The color"], a: 1, e: "Removable prostheses are designed to be removed by the wearer; fixed prostheses cannot be removed by the patient." }
            ]},
            { id: 2, title: "RPD Objectives & Treatment Options", questions: [
                { q: "What is the first objective of a Removable Partial Denture (RPD)?", o: ["Improve esthetics", "Preservation of remaining teeth and tissues", "Restore speech", "Enhance psychological comfort"], a: 1, e: "The first objective of RPD is Preservation of Remaining Teeth and Tissues." },
                { q: "According to RPD objectives, what happens if we preserve the remaining teeth?", o: ["We prevent muscle and TMJ problems", "We cause more decay", "We increase tooth mobility", "We lose bone faster"], a: 0, e: "Preservation of remaining teeth includes prevention of muscle and TMJ problems." },
                { q: "Restoring continuity of the dental arch by an RPD primarily improves:", o: ["Esthetics only", "Masticatory function", "Speech only", "Saliva production"], a: 1, e: "RPD improves masticatory function by restoring continuity of the dental arch." },
                { q: "Which of the following is a sequelae of tooth extraction without replacement?", o: ["Mesial drift of all teeth", "Continuous eruption of unopposed teeth", "Decreased overjet", "Increased bone height"], a: 1, e: "Sequelae include continuous eruption of unopposed teeth." },
                { q: "What happens to the mandible when posterior teeth are extracted and not replaced?", o: ["It moves forward and closes (overclosure and protrusion)", "It moves backward", "It stays the same", "It widens"], a: 0, e: "Sequelae include overclosure and protrusion of the mandible." },
                { q: "Which speech sounds are restored by replacing missing teeth with an RPD?", o: ["Guttural sounds (G, K)", "Labiodental sounds (F, V)", "Nasal sounds (M, N)", "Palatal sounds (Sh, Ch)"], a: 1, e: "RPD provides restoration of impaired speech including dentolabial sounds (F, V)." },
                { q: "What is the first clinical procedure in RPD construction?", o: ["Final impression", "Framework fabrication", "Clinical examination, diagnosis and treatment planning", "Teeth setting"], a: 2, e: "The first clinical procedure listed is Clinical Examination, Diagnosis and Treatment Planning." },
                { q: "Which material is typically used for preliminary (primary) impressions?", o: ["Polyether", "Alginate", "PVS (polyvinyl siloxane)", "Zinc oxide eugenol"], a: 1, e: "Preliminary impression uses elastic material (e.g., Alginate)." },
                { q: "Surveying of the study cast is done for which primary purpose?", o: ["To pour the master cast", "To make the special tray", "To perform preliminary designing", "To process the acrylic"], a: 2, e: "Clinical procedures include Surveying and Preliminary Designing after the study cast is made." },
                { q: "Which of the following is a laboratory procedure in RPD construction?", o: ["Final impression", "Prosthetic mouth preparation", "Fabrication of framework", "Bite registration"], a: 2, e: "Laboratory procedures include Fabrication of Framework (master cast prep, duplication, wax pattern, casting, finishing)." },
                { q: "What is the purpose of a study cast?", o: ["To deliver the final denture", "To serve as a diagnostic document and treatment plan guide", "To replace the master cast", "To cure acrylic resin"], a: 1, e: "Functions of the study cast include explaining the condition to the patient and using it as a document for case progress." },
                { q: "Which of the following prevents drifting and tilting of remaining teeth after extraction?", o: ["Leaving the space empty", "Immediate placement of a temporary (interim) partial denture", "Extraction of more teeth", "Root canal treatment"], a: 1, e: "A temporary (interim) partial denture prevents drifting or tilting of remaining teeth." },
                { q: "What is the principle behind \"preservation of the residual ridge\"?", o: ["The ridge should be surgically reduced", "The ridge should be covered and stimulated by the denture base", "The ridge should be left uncovered", "The ridge should be filled with bone grafts"], a: 1, e: "Objectives of RPD include preservation of residual ridge." },
                { q: "What is the final step after delivering an RPD to the patient?", o: ["Processing", "Framework fabrication", "Home care instructions and post-insertion recall", "Wax try-in"], a: 2, e: "The last clinical procedure listed is Home care instructions and post-insertion recall." },
                { q: "What does \"prosthetic mouth preparation\" include?", o: ["Only tooth extraction", "Rest seat preparation, guide planes, and occlusal adjustment", "Final polishing of the denture", "Teeth arrangement"], a: 1, e: "Mouth preparation includes correction of occlusal interferences, preparation of rest seats, and preparation of guide planes." },
                { q: "What happens to the oral mucosa when teeth are extracted and not replaced?", o: ["It becomes thicker", "Trauma to oral mucosa can occur", "It becomes keratinized", "It grows new teeth"], a: 1, e: "Sequelae of tooth extraction without replacement include trauma to oral mucosa." },
                { q: "What is the purpose of the \"trial prosthesis fabrication\" step?", o: ["To make the final metal framework", "To verify occlusion, esthetics, and fit before processing", "To take the primary impression", "To extract teeth"], a: 1, e: "Trial prosthesis fabrication includes occlusion rim construction, bite registration, tooth setting, and wax try-in before processing." },
                { q: "Which of the following is NOT a sequelae of tooth extraction without replacement?", o: ["Drifting and rotation of remaining teeth", "Improved masticatory efficiency", "Overclosure and protrusion of the mandible", "Facial or TMJ pain"], a: 1, e: "All options except \"improved masticatory efficiency\" are listed as sequelae of tooth extraction without replacement." },
                { q: "What is the role of an RPD in relation to the tongue?", o: ["It pushes the tongue back", "It preserves tongue contour and space", "It cuts the tongue", "It has no relation to the tongue"], a: 1, e: "Objectives of RPD include preservation of tongue contour and space." },
                { q: "When is a transitional partial denture used?", o: ["When no more teeth will be extracted", "When additional teeth are expected to be extracted in the future", "For edentulous patients only", "For implant patients only"], a: 1, e: "A transitional partial denture is used when additional teeth are expected to be extracted (common in phased treatment plans)." }
            ]},
            { id: 3, title: "Types of Edentulous Areas & Partial Dentures", questions: [
                { q: "An edentulous area with an abutment tooth on each end is called:", o: ["Free-end saddle", "Bounded edentulous area", "Distal extension", "Terminal saddle"], a: 1, e: "A bounded edentulous area has an abutment tooth on each end." },
                { q: "A free-end edentulous area (distal extension saddle) has an abutment tooth on:", o: ["Both ends", "One side only", "Neither side", "The distal side only"], a: 1, e: "A free-end edentulous area has an abutment tooth on one side only and no posterior abutment." },
                { q: "What is an abutment?", o: ["The artificial tooth", "A tooth that supports and/or retains a prosthesis", "The denture base", "The major connector"], a: 1, e: "An abutment is a tooth, a portion of a tooth, or that portion of a dental implant that serves to support and/or retain a prosthesis." },
                { q: "Which type of partial denture is used immediately after extraction during the healing period?", o: ["Conventional partial denture", "Temporary (interim) partial denture", "Cast partial denture", "Fixed bridge"], a: 1, e: "A temporary (interim) partial denture is a short-term prosthesis used immediately after extraction or during the healing period." },
                { q: "A transitional partial denture can be modified by:", o: ["Shortening the flange", "Adding artificial teeth", "Removing the clasps", "Reducing the base"], a: 1, e: "A transitional partial denture can be modified by adding artificial teeth when additional teeth are expected to be extracted." },
                { q: "Which partial denture is constructed with a metal framework for maximum strength?", o: ["Interim denture", "Transitional denture", "Conventional (cast) partial denture", "Immediate denture"], a: 2, e: "A conventional (cast) partial denture is constructed with a metal framework and provides maximum strength, support, retention, and stability." },
                { q: "A patient missing tooth #19 (first molar) with teeth #18 and #20 present has what type of edentulous area?", o: ["Free-end saddle", "Bounded edentulous area", "Distal extension", "Class I situation"], a: 1, e: "Since there is an abutment tooth on both ends (#18 mesial and #20 distal), this is a bounded edentulous area." },
                { q: "A patient missing teeth #30, #31, and #32 (lower right molars and third molar) with #29 present has:", o: ["Bounded saddle", "Free-end saddle (distal extension)", "Class III situation", "Anterior bounded space"], a: 1, e: "There is an abutment tooth on one side (#29 mesial) only and no posterior abutment, making it a free-end saddle." },
                { q: "What is the main purpose of an interim partial denture?", o: ["Permanent replacement of teeth", "Maintain esthetics and function, and prevent drifting during healing", "Correct malocclusion", "Whiten remaining teeth"], a: 1, e: "An interim partial denture maintains esthetics and function and prevents drifting or tilting of remaining teeth during healing." },
                { q: "Which of the following best describes a conventional (cast) partial denture?", o: ["A short-term prosthesis", "The final long-term prosthesis with a metal framework", "A denture that cannot be modified", "A denture made only of acrylic"], a: 1, e: "A conventional (cast) partial denture is the final long-term prosthesis constructed with a metal framework." },
                { q: "In a bounded edentulous area, the denture is primarily supported by:", o: ["Only the soft tissues", "The abutment teeth on both ends", "The tongue", "The palate only"], a: 1, e: "A bounded edentulous area has an abutment tooth on each end, so the prosthesis is tooth-supported." },
                { q: "In a free-end saddle (distal extension), the denture derives support from:", o: ["Teeth only", "Tissues only", "Both teeth and tissues (mixed support)", "Implants only"], a: 2, e: "A free-end saddle has an abutment on one side only, so support comes from both the abutment tooth and the residual ridge." },
                { q: "Which type of partial denture is later replaced by a definitive prosthesis?", o: ["Cast partial denture", "Interim partial denture", "Fixed bridge", "Implant-supported denture"], a: 1, e: "An interim partial denture is later replaced by a definitive prosthesis." },
                { q: "What does \"phased treatment plan\" refer to in relation to transitional dentures?", o: ["Treating all teeth at once", "Extracting teeth in stages and adding teeth to the transitional denture", "Using only fixed prostheses", "Avoiding all extractions"], a: 1, e: "Transitional dentures are common in phased treatment plans where additional teeth are expected to be extracted over time." },
                { q: "A patient missing teeth #14, #15, and #16 (upper left premolars and first molar) with #13 and #17 present has:", o: ["Free-end saddle", "Bounded saddle", "Distal extension on both sides", "Class II situation"], a: 1, e: "There is an abutment tooth on both ends (#13 mesial and #17 distal), so this is a bounded edentulous area." },
                { q: "What is the main advantage of a cast partial denture over an interim denture?", o: ["Lower cost", "Faster fabrication", "Accurate fit and long service life", "No need for impressions"], a: 2, e: "A cast partial denture provides accurate fit and long service life compared to interim dentures." },
                { q: "Which of the following is NOT a type of partial denture mentioned?", o: ["Temporary (interim)", "Transitional", "Conventional (cast)", "Telescopic"], a: 3, e: "The three types mentioned are Temporary (Interim), Transitional, and Conventional (Cast) partial dentures." },
                { q: "A patient has a free-end saddle on the lower right side. How many abutment teeth support this prosthesis posteriorly?", o: ["Two", "One", "Three", "None"], a: 1, e: "A free-end edentulous area has an abutment tooth on one side only (the mesial side) and no posterior abutment." },
                { q: "What is the main reason for using an interim partial denture immediately after extraction?", o: ["To permanently replace the tooth", "To maintain esthetics during the healing period", "To increase bone loss", "To prevent all future extractions"], a: 1, e: "An interim partial denture is used immediately after extraction to maintain esthetics and function during the healing period." },
                { q: "A patient has a missing upper central incisor due to trauma and wants an immediate replacement. Which denture is most appropriate?", o: ["Cast partial denture", "Interim partial denture", "Transitional partial denture", "Complete denture"], a: 1, e: "An interim partial denture is used immediately after extraction (or loss) for esthetics and function during healing." }
            ]},
            { id: 4, title: "RPD Components (Overview)", questions: [
                { q: "Which component of an RPD is rigid and connects the parts of the prosthesis on both sides of the arch?", o: ["Minor connector", "Major connector", "Denture base", "Artificial tooth"], a: 1, e: "A major connector is a rigid component connecting the parts of the prosthesis on both sides of the arch." },
                { q: "What connects the major connector to other components like clasps, rests, and denture bases?", o: ["Major connector", "Direct retainer", "Minor connector", "Denture base"], a: 2, e: "A minor connector connects the major connector to other components (clasps, rests, denture bases)." },
                { q: "The part of the denture that rests on the residual ridge and supports the artificial teeth is the:", o: ["Major connector", "Minor connector", "Clasp", "Denture base"], a: 3, e: "The denture base is the part resting on the residual ridge and supports the artificial teeth." },
                { q: "What is the primary function of a direct retainer (clasp assembly)?", o: ["Support", "Retention (resists dislodgement)", "Major connection", "Esthetics"], a: 1, e: "A direct retainer engages an abutment tooth to resist dislodgement." },
                { q: "What is the primary function of a rest?", o: ["Retention", "Support (prevents tissue-ward movement)", "Stabilization", "Major connection"], a: 1, e: "The primary function of a rest is support (prevents tissue-ward movement)." },
                { q: "Which type of rest is used on posterior teeth?", o: ["Incisal rest", "Cingulum rest", "Occlusal rest", "Labial rest"], a: 2, e: "Occlusal rests are used on posterior teeth." },
                { q: "Which type of rest is used on the lingual surface of canines?", o: ["Occlusal rest", "Incisal rest", "Cingulum rest", "Labial rest"], a: 2, e: "A cingulum rest is used on canines (anterior teeth)." },
                { q: "What does a rest do in relation to occlusal forces?", o: ["It increases occlusal forces", "It directs occlusal forces along the long axis of the abutment tooth", "It eliminates all forces", "It transfers forces to the tongue"], a: 1, e: "A rest directs occlusal forces along the long axis of the abutment tooth." },
                { q: "What is the function of artificial teeth in an RPD?", o: ["Only esthetics", "Only mastication", "Restore mastication, esthetics, and phonetics", "Only speech"], a: 2, e: "Artificial teeth restore mastication, esthetics, and phonetics." },
                { q: "What does the denture base transmit to the supporting tissues?", o: ["Only horizontal forces", "Occlusal forces", "Only rotational forces", "No forces"], a: 1, e: "The denture base transmits occlusal forces to the supporting tissues." },
                { q: "Which component is considered a rigid part of the clasp assembly?", o: ["Retentive tip", "Minor connector", "Flexible clasp arm", "Wrought wire"], a: 1, e: "Minor connectors are rigid parts that connect the major connector to other components." },
                { q: "What maintains the proper position of the clasp assembly on the abutment tooth?", o: ["The major connector", "The denture base", "The rest", "The artificial tooth"], a: 2, e: "The rest maintains the proper position of the clasp assembly." },
                { q: "An incisal rest is placed on which part of an anterior tooth?", o: ["The buccal surface", "The lingual surface", "The incisal edge", "The root"], a: 2, e: "An incisal rest is used on anterior teeth at the incisal edge." },
                { q: "Which of the following is NOT a component of an RPD?", o: ["Major connector", "Minor connector", "Dental pulp", "Denture base"], a: 2, e: "The components of RPD are major connector, minor connector, denture base, artificial teeth, direct retainer, and rest." },
                { q: "What is the function of a minor connector regarding stabilization?", o: ["It provides retention", "It provides rigid stabilization by connecting rigid parts", "It provides flexibility", "It provides esthetics only"], a: 1, e: "Minor connectors are rigid and connect the major connector to other components, providing stabilization." },
                { q: "What does a clasp assembly consist of?", o: ["Major connector only", "Minor connector, rest, retentive clasp arm, and reciprocal clasp arm", "Artificial teeth only", "Denture base only"], a: 1, e: "A clasp assembly includes minor connector, rest, retentive clasp arm, and non-retentive (reciprocal) clasp arm." },
                { q: "What is the main difference between a major connector and a minor connector?", o: ["Major is flexible, minor is rigid", "Major connects both sides of the arch, minor connects major to other components", "Major is made of acrylic, minor is metal", "Major is only for maxilla, minor for mandible"], a: 1, e: "The major connector connects parts on both sides of the arch; the minor connector connects the major connector to other components." },
                { q: "Which component of an RPD directly supports the artificial teeth?", o: ["Major connector", "Minor connector", "Denture base", "Clasp"], a: 2, e: "The denture base is the part that rests on the residual ridge and to which the artificial teeth are attached." },
                { q: "What is the role of a rest in relation to the clasp assembly?", o: ["It replaces the clasp", "It maintains the proper position of the clasp assembly", "It eliminates the need for a clasp", "It connects the clasp to the tongue"], a: 1, e: "The rest maintains the proper position of the clasp assembly to maintain the desired tooth-clasp relationship." },
                { q: "Which component of an RPD is primarily responsible for preventing food trapping between the tooth and the clasp?", o: ["Major connector", "Denture base", "Rest", "Artificial tooth"], a: 2, e: "One function of the rest is to prevent ingress (trapping) of food between the tooth and the clasp." }
            ]},
            { id: 5, title: "Kennedy Classification (Part 1)", questions: [
                { q: "Kennedy Class I describes an arch with:", o: ["A unilateral free-end saddle", "Bilateral free-end saddles (posterior edentulous areas on both sides)", "A bounded saddle", "An anterior edentulous area crossing the midline"], a: 1, e: "Kennedy Class I is defined as bilateral edentulous areas located posterior to the remaining natural teeth." },
                { q: "Kennedy Class II describes an arch with:", o: ["Bilateral free-end saddles", "A unilateral free-end saddle (posterior on one side only)", "A bounded saddle between teeth", "An anterior edentulous area"], a: 1, e: "Kennedy Class II is a unilateral edentulous area located posterior to the remaining natural teeth." },
                { q: "Kennedy Class III describes an arch with:", o: ["A free-end saddle", "A bounded edentulous area with teeth on both sides", "Bilateral free-end saddles", "Anterior teeth missing crossing midline"], a: 1, e: "Kennedy Class III is a unilateral edentulous area with natural teeth remaining both anterior and posterior to it (bounded saddle)." },
                { q: "Kennedy Class IV describes an arch with:", o: ["Bilateral posterior edentulous areas", "Unilateral posterior edentulous area", "A single anterior edentulous area crossing the midline", "Multiple bounded saddles"], a: 2, e: "Kennedy Class IV is a single, bilateral (crossing the midline) edentulous area located anterior to the remaining natural teeth." },
                { q: "Which Kennedy class has NO distal abutment on both sides?", o: ["Class I", "Class II", "Class III", "Class IV"], a: 0, e: "Class I has bilateral free-end saddles with no distal abutment on both sides." },
                { q: "Which Kennedy class has a free-end saddle on one side only?", o: ["Class I", "Class II", "Class III", "Class IV"], a: 1, e: "Class II is a unilateral free-end saddle (posterior on one side only)." },
                { q: "Which Kennedy class is the MOST stable?", o: ["Class I", "Class II", "Class III", "Class IV"], a: 2, e: "Class III (bounded saddle) is the most stable class because it has abutment teeth on both ends." },
                { q: "A patient missing teeth #14, #15, #16, #17 (upper left posterior) but has all teeth on the right side present. This is:", o: ["Class I", "Class II", "Class III", "Class IV"], a: 1, e: "This is a unilateral free-end saddle (posterior on one side only), which is Class II." },
                { q: "A patient missing teeth #18, #19, #20, #21 (lower left posterior) AND #30, #31 (lower right posterior). This is:", o: ["Class I", "Class II", "Class III", "Class IV"], a: 0, e: "This is bilateral free-end saddles (posterior on both sides), which is Class I." },
                { q: "A patient missing teeth #7, #8, #9, #10 (upper anterior crossing midline) with all posterior teeth present. This is:", o: ["Class I", "Class II", "Class III", "Class IV"], a: 3, e: "This is a single anterior edentulous area crossing the midline, which is Class IV." },
                { q: "A patient missing tooth #20 (lower second premolar) with teeth #19 and #21 present. This is:", o: ["Class I", "Class II", "Class III", "Class IV"], a: 2, e: "This is a bounded saddle (tooth on both ends), which is Class III." },
                { q: "Which Kennedy classes are considered \"free-end\" or \"distal extension\" cases?", o: ["Class III and IV", "Class I and II", "Class II and III", "Class I and IV"], a: 1, e: "Class I (bilateral free-end) and Class II (unilateral free-end) are both distal extension cases." },
                { q: "In Kennedy Class I, the edentulous areas are located:", o: ["Anterior to the remaining teeth", "Posterior to the remaining teeth", "Between remaining teeth", "Crossing the midline"], a: 1, e: "Class I is defined as bilateral edentulous areas located posterior to the remaining natural teeth." },
                { q: "In Kennedy Class III, the edentulous area is:", o: ["Always anterior", "Always posterior", "Between teeth (bounded on both sides)", "Always crossing the midline"], a: 2, e: "Class III is a unilateral edentulous area with natural teeth remaining both anterior and posterior to it." },
                { q: "Which Kennedy class has a single edentulous area that crosses the midline?", o: ["Class I", "Class II", "Class III", "Class IV"], a: 3, e: "Class IV is a single, bilateral (crossing the midline) edentulous area located anterior to the remaining natural teeth." },
                { q: "A patient has a free-end saddle on the lower right side and a bounded saddle on the upper left side. How do we classify the lower arch?", o: ["Class I", "Class II", "Class III", "Class IV"], a: 1, e: "Each arch is classified separately; the lower arch has a unilateral free-end saddle, which is Class II." },
                { q: "Why is Class III more stable than Class I?", o: ["Because it has no teeth", "Because it has abutment teeth on both ends of the edentulous space", "Because it is in the maxilla", "Because it is always small"], a: 1, e: "A bounded saddle (Class III) has support from both ends, making it more stable than free-end saddles (Class I and II)." },
                { q: "A patient is missing all molars on both sides (teeth #1, #2, #3, #14, #15, #16, #17, #30, #31, #32) but has all premolars and anteriors. This is:", o: ["Class I", "Class II", "Class III", "Class IV"], a: 0, e: "The most posterior edentulous areas are bilateral free-end saddles (behind the premolars), which is Class I." },
                { q: "A patient is missing tooth #11 (upper left central incisor) only. This is NOT Class IV because:", o: ["It does not cross the midline", "It is in the posterior", "It is bounded", "It is a free end"], a: 0, e: "Class IV requires a single anterior edentulous area that crosses the midline (bilateral). A single central incisor missing does not cross the midline." },
                { q: "Which Kennedy class is characterized by the phrase \"bilateral distal extension\"?", o: ["Class I", "Class II", "Class III", "Class IV"], a: 0, e: "Class I is also called bilateral distal extension because both sides have free-end saddles extending distally." }
            ]},
            { id: 6, title: "Kennedy Classification (Part 2)", questions: [
                { q: "According to Applegate's Rule 1, when should classification be done?", o: ["Before any extractions", "After extractions that might alter the original classification", "Without examining the patient", "Only on the maxillary arch"], a: 1, e: "Rule 1 states: Classification should follow rather than precede extraction that might alter the original classification." },
                { q: "According to Applegate's Rule 2, if a third molar is missing and NOT to be replaced, it is:", o: ["Considered a modification", "Considered in the classification", "Not considered in the classification", "Always replaced"], a: 2, e: "Rule 2 states: If the third molar is missing and not to be replaced, it is NOT considered in the classification." },
                { q: "According to Applegate's Rule 3, if a third molar is present and will be used as an abutment, it is:", o: ["Ignored", "Considered in the classification", "Always extracted", "Considered a modification space"], a: 1, e: "Rule 3 states: If a third molar is present and is to be used as an abutment, it IS considered in the classification." },
                { q: "According to Applegate's Rule 4, if a second molar is missing and NOT to be replaced, it is:", o: ["Always a modification", "Not considered in the classification", "Considered a Class I", "Always replaced"], a: 1, e: "Rule 4 states: If a second molar is missing and is not to be replaced, it is NOT considered in the classification." },
                { q: "According to Applegate's Rule 5, what determines the classification?", o: ["The largest edentulous area", "The most anterior edentulous area", "The most posterior edentulous area(s)", "The number of missing teeth"], a: 2, e: "Rule 5 states: The most posterior edentulous area(s) always determine the classification." },
                { q: "What are \"modification spaces\" according to Applegate's Rule 6?", o: ["The main edentulous areas", "Edentulous areas other than those determining the classification", "The largest edentulous areas", "The anterior edentulous areas only"], a: 1, e: "Rule 6 states: Edentulous areas other than those determining the classification are called modification spaces." },
                { q: "According to Applegate's Rule 7, what is considered about a modification?", o: ["The size of the modification", "The location of the modification", "Only the number of additional edentulous areas", "The shape of the modification"], a: 2, e: "Rule 7 states: The extent (size) of the modification is NOT considered, only the number of additional edentulous areas." },
                { q: "According to Applegate's Rule 8, can a Class IV arch have modification spaces?", o: ["Yes, always", "No, Class IV arches do NOT have modification spaces", "Yes, but only one", "Yes, but only posterior"], a: 1, e: "Rule 8 states: Class IV arches do NOT have modification spaces." },
                { q: "A patient has a Class I situation (bilateral free-end) and is also missing a central incisor. This is classified as:", o: ["Class I", "Class I mod 1", "Class IV", "Class II mod 1"], a: 1, e: "The most posterior area determines Class I, and the additional anterior space is one modification (mod 1)." },
                { q: "A patient has a Class II situation (right free-end) and is also missing two other teeth in the anterior region. This is:", o: ["Class II mod 1", "Class II mod 2", "Class I mod 2", "Class IV"], a: 1, e: "Class II (most posterior) plus two additional edentulous areas = Class II mod 2." },
                { q: "If a patient has a single anterior edentulous area crossing the midline AND a posterior free-end saddle, what is the classification?", o: ["Class IV mod 1", "Class I (posterior determines class, and Class IV has no modifications)", "Class II mod 1", "Class III"], a: 1, e: "Rule 5 says the most posterior area determines the class, so it becomes Class I, not Class IV." },
                { q: "Why is a missing third molar often ignored in classification?", o: ["Because it is too small", "Because it is often not replaced (Rule 2)", "Because it is in the maxilla", "Because it has no function"], a: 1, e: "Rule 2 states: If the third molar is missing and not to be replaced, it is NOT considered in the classification." },
                { q: "How are modifications designated?", o: ["By their size (large, medium, small)", "By their number (mod 1, mod 2, mod 3, etc.)", "By their location (anterior, posterior)", "By their shape"], a: 1, e: "Rule 6 states modifications are designated by their number." },
                { q: "A patient has a Class III bounded saddle on the right and also missing a molar on the left (free-end). What is the classification?", o: ["Class III mod 1", "Class I (because the most posterior area is the left free-end)", "Class II mod 1", "Class IV"], a: 1, e: "Rule 5 states the most posterior edentulous area(s) always determine the classification (left free-end is more posterior than right bounded saddle)." },
                { q: "According to Applegate, when should a third molar be considered in classification?", o: ["When it is decayed", "When it is present and will be used as an abutment (Rule 3)", "When it is impacted", "When it is missing"], a: 1, e: "Rule 3 states: If a third molar is present and is to be used as an abutment, it IS considered in the classification." },
                { q: "A patient has a Class II free-end on the right and a bounded saddle on the left. This is:", o: ["Class II mod 1", "Class I", "Class III mod 1", "Class IV"], a: 0, e: "The most posterior area is the right free-end (Class II), and the left bounded saddle is an additional area (mod 1)." },
                { q: "What is the maximum number of modifications that can be present in a Class I arch?", o: ["None", "One", "Two", "There is no maximum number (Rule 7 only counts number, not limits)"], a: 3, e: "Rule 7 does not limit the number of modifications; it only says to count them." },
                { q: "A patient is missing #1, #2, #3 (upper right molars) and #14, #15, #16 (upper left molars). All other teeth are present. This is:", o: ["Class I", "Class II", "Class III", "Class IV"], a: 0, e: "The most posterior edentulous areas are bilateral free-end saddles (both sides missing molars) = Class I." },
                { q: "Why is Class IV not allowed to have modifications?", o: ["Because it is too small", "Because it is an anterior class (Rule 8)", "Because it has no teeth", "Because it is always in the mandible"], a: 1, e: "Rule 8 states: Class IV arches do NOT have modification spaces." },
                { q: "A patient is missing teeth #22, #23, #24, #25 (lower anterior crossing midline) and also missing #18 (lower left third molar which will NOT be replaced). What is the classification?", o: ["Class IV", "Class I (because the third molar is missing and not replaced, so it's ignored)", "Class II mod 1", "Class III"], a: 0, e: "The missing third molar is ignored (Rule 2), so the only edentulous area is anterior crossing midline = Class IV." }
            ]},
            { id: 7, title: "Denture Base (Saddle)", questions: [
                { q: "What is the denture base (saddle)?", o: ["The part that connects both sides of the arch", "The part that rests on the oral mucosa and to which artificial teeth are attached", "The clasp that retains the denture", "The metal framework"], a: 1, e: "The denture base (saddle) is the part of the denture that rests on the oral mucosa and to which artificial teeth are attached." },
                { q: "Which of the following is a function of the denture base?", o: ["To provide retention only", "To distribute occlusal forces to the residual ridge", "To act as a clasp", "To replace the major connector"], a: 1, e: "Functions of the denture base include distributing occlusal forces to the residual ridge." },
                { q: "A tooth-supported denture base is defined as:", o: ["A base that rests only on soft tissue", "A base that restores an edentulous region with abutment teeth at each end", "A base that has no support", "A base made only of acrylic"], a: 1, e: "A tooth-supported denture base restores an edentulous region which has abutment teeth at each end of the edentulous space." },
                { q: "An extension base (free-end saddle) is defined as:", o: ["A base supported by teeth on both ends", "A base supported by natural teeth at one end only, with part of the load carried by the residual ridge", "A base made only of metal", "A base that never needs relining"], a: 1, e: "An extension base (free-end saddle) is supported and retained by natural teeth at one end only, where a significant portion of functional load is carried by the residual ridge." },
                { q: "Which type of denture base requires maximum tissue coverage and intimate adaptation?", o: ["Tooth-supported base", "Extension base (free-end saddle)", "Metal base only", "Acrylic base only"], a: 1, e: "Requirements of a free-end denture base include maximum tissue coverage and intimate fit." },
                { q: "Which of the following is a requirement for a free-end denture base to achieve maximum support?", o: ["Minimum tissue coverage", "Intimate adaptation between base and tissues", "Leaving a gap between base and tissue", "Using only metal"], a: 1, e: "To achieve maximum support, the free-end base requires intimate adaptation between the base and underlying tissues." },
                { q: "Which denture base material has the best thermal conductivity?", o: ["Acrylic", "Metal (Chrome-Cobalt)", "Porcelain", "Composite"], a: 1, e: "An ideal denture base should have good thermal conductivity; metal has this property while acrylic does not." },
                { q: "What is an advantage of an acrylic denture base?", o: ["High strength", "Dimensional stability", "Easy to reline and rebase", "High thermal conductivity"], a: 2, e: "Advantages of acrylic denture base include that it is easily relined and rebased." },
                { q: "What is a disadvantage of an acrylic denture base?", o: ["Low cost", "Good esthetics", "Dimensional instability", "Light weight"], a: 2, e: "Disadvantages of acrylic denture base include dimensional instability." },
                { q: "Which metallic denture base material is rigid even in thin sections and has high corrosion resistance?", o: ["Gold alloy", "Chrome-Cobalt alloy", "Silver alloy", "Copper alloy"], a: 1, e: "Chrome-Cobalt alloy is rigid even in thin sections and has high corrosion resistance." },
                { q: "Which metallic denture base material is sometimes used in lower partial dentures to improve retention because it is heavier?", o: ["Chrome-Cobalt", "Titanium", "Cast Gold alloy", "Stainless steel"], a: 2, e: "Cast gold alloy is heavier than chrome-cobalt and is sometimes used in lower partial dentures to improve retention." },
                { q: "What is a combination denture base (metal + acrylic)?", o: ["A base made entirely of acrylic", "A base made entirely of metal", "A base with a metal framework and acrylic covering", "A base made of porcelain"], a: 2, e: "A combination denture base consists of metal (framework) with acrylic resin attached (meshwork attachment)." },
                { q: "What is the main advantage of titanium as a denture base material?", o: ["Low cost", "Rigidity in thin sections and high corrosion resistance", "Easy to reline", "Poor esthetics"], a: 1, e: "Titanium is rigid in thin sections, has high corrosion resistance, high polish, and is not easily abraded." },
                { q: "Why does a free-end saddle often require relining?", o: ["Because the metal breaks", "Because the residual ridge changes over time", "Because the teeth wear down", "Because the clasps break"], a: 1, e: "In free-end saddles, the residual ridge undergoes changes over time, so the denture base may lose its accurate fit and require relining." },
                { q: "What property of a denture base allows the patient to feel thermal stimuli?", o: ["Low specific gravity", "High thermal conductivity", "Dimensional stability", "Low cost"], a: 1, e: "Good thermal conductivity allows the patient to feel thermal stimuli (hot/cold)." },
                { q: "Which denture base material has the lowest specific gravity (lightest)?", o: ["Chrome-Cobalt", "Gold", "Acrylic", "Titanium"], a: 2, e: "Acrylic has low specific gravity (lightweight), which is an advantage especially in maxillary dentures." },
                { q: "What is the role of the denture base in stabilization?", o: ["It provides retention only", "With maximum ridge coverage and intimate adaptation, it prevents lateral displacement", "It replaces the major connector", "It has no role in stabilization"], a: 1, e: "If the denture base has maximum ridge coverage and intimate tissue adaptation, it prevents lateral displacement and provides stabilization." },
                { q: "Which denture base material is least hygienic (accumulates plaque easily)?", o: ["Highly polished metal", "Acrylic (less hygienic than polished metal)", "Titanium", "Gold"], a: 1, e: "Acrylic denture bases are less hygienic than metal bases because they accumulate plaque more easily." },
                { q: "What is the main indication for a combination denture base (metal + acrylic)?", o: ["Only bounded saddles", "Extension base partial dentures and long-span edentulous ridges", "Anterior teeth only", "Complete dentures"], a: 1, e: "Combination denture bases are indicated for extension base partial dentures and long-span edentulous ridges." },
                { q: "Why is dimensional stability important in a denture base?", o: ["So the denture looks good", "So the denture remains accurate when delivered and maintains accuracy over time", "So the denture is cheap", "So the denture is heavy"], a: 1, e: "Dimensional stability means the denture base is accurate when delivered and maintains accuracy over time." }
            ]},
            { id: 8, title: "Artificial Teeth Materials", questions: [
                { q: "Which artificial tooth material has high resilience and provides less trauma to the residual ridge?", o: ["Porcelain", "Acrylic resin (plastic)", "Metal", "Ceramic"], a: 1, e: "Acrylic teeth have high resilience and provide less trauma to ridges." },
                { q: "Which artificial tooth material is brittle and prone to fracture under stress?", o: ["Acrylic", "Porcelain", "Composite", "Metal"], a: 1, e: "Porcelain teeth are very brittle and prone to fracture under stress." },
                { q: "Which tooth material has the highest abrasion resistance (most wear-resistant)?", o: ["Acrylic", "Porcelain", "Composite", "Vinyl"], a: 1, e: "Porcelain has high abrasion resistance and is very wear-resistant." },
                { q: "How do acrylic teeth bond to the acrylic denture base?", o: ["Mechanically only", "Chemically (fair chemical bond)", "By screws", "They do not bond"], a: 1, e: "Acrylic teeth have a fair chemical bond to the denture plastic." },
                { q: "What is a disadvantage of porcelain teeth during mastication?", o: ["They are silent", "They may produce a clicking sound", "They are too soft", "They change color"], a: 1, e: "Porcelain teeth may produce a possible clicking sound during mastication." },
                { q: "What are \"tube teeth\" used for?", o: ["Acrylic teeth only", "Mechanical retention of porcelain teeth (channel for retention pin)", "Metal teeth", "Composite teeth"], a: 1, e: "Tube teeth are teeth with a channel for a retention pin, used to mechanically lock porcelain teeth into the denture base." },
                { q: "Which tooth material is easy to adjust, reshape, and polish after grinding?", o: ["Porcelain", "Acrylic", "Ceramic", "Porcelain-fused-to-metal"], a: 1, e: "Acrylic teeth are easy to change shape and color and can be polished after grinding." },
                { q: "Metallic teeth are usually used in which region of the mouth?", o: ["Anterior (front)", "Posterior (back)", "Canines only", "Incisors only"], a: 1, e: "Metallic teeth are usually used for posterior teeth." },
                { q: "What are composite (Isosite) teeth built on?", o: ["A metal frame", "A glass fiber frame", "An acrylic core", "A porcelain core"], a: 1, e: "Composite (Isosite) teeth are built on a glass fiber frame, then flow composite is applied and light-cured." },
                { q: "Which tooth material has wear resistance and color stability similar to enamel?", o: ["Acrylic", "Porcelain", "Composite (Isosite)", "Vinyl"], a: 2, e: "Composite/Isosite teeth have wear resistance and color stability similar to enamel." },
                { q: "What is a \"facing\" in partial dentures?", o: ["The back surface of a tooth", "Only the front surface of a tooth used for esthetics", "The metal framework", "The denture base"], a: 1, e: "Facings are the front surface only of a tooth, used in esthetic zones for natural appearance." },
                { q: "What are Reinforced Acrylic Pontics (RAPS)?", o: ["Acrylic teeth with no reinforcement", "Acrylic teeth reinforced with fiber or metal for strength", "Porcelain teeth", "Metal teeth only"], a: 1, e: "Reinforced Acrylic Pontics (RAPS) are acrylic teeth reinforced with fiber or metal, making them stronger." },
                { q: "How do porcelain teeth retain to the denture base?", o: ["Chemical bond", "Mechanical retention (pins, channels, metal backing)", "Adhesive cement", "Magnetic attachment"], a: 1, e: "Porcelain teeth require mechanical retention because they do not chemically bond to acrylic." },
                { q: "Which tooth material is inert and shows no dimensional changes in the mouth?", o: ["Acrylic", "Porcelain", "Composite", "Vinyl"], a: 1, e: "Porcelain is inert in mouth fluids and has no dimensional changes." },
                { q: "Why are acrylic teeth preferred when the interocclusal space is very short?", o: ["Because they are very hard", "Because they are easy to reduce and reshape", "Because they are expensive", "Because they never wear"], a: 1, e: "Acrylic teeth are easy to reduce and reshape, making them suitable for short interocclusal arch space." },
                { q: "What happens when you grind a porcelain tooth?", o: ["It becomes stronger", "The surface glaze is removed", "It becomes easier to polish", "It bonds better to acrylic"], a: 1, e: "Grinding a porcelain tooth removes the surface glaze, and it is difficult to reshape after grinding." },
                { q: "What is a disadvantage of acrylic teeth compared to porcelain?", o: ["They are heavier", "They have low abrasion resistance (wear faster)", "They are more brittle", "They have poor esthetics"], a: 1, e: "Acrylic teeth have low abrasion resistance and wear faster than porcelain teeth." },
                { q: "What is the main advantage of metallic posterior teeth?", o: ["Excellent esthetics", "They maintain vertical dimension of occlusion when interarch space is reduced", "They are very light", "They are silent during chewing"], a: 1, e: "Metallic teeth maintain vertical dimension of occlusion and are durable, especially when interarch space is reduced." },
                { q: "Which tooth material is associated with a \"natural feel\" and is silent during mastication?", o: ["Porcelain", "Acrylic", "Metal", "Ceramic"], a: 1, e: "Acrylic teeth have a natural feel and are silent during mastication, unlike porcelain which may click." },
                { q: "What is the main disadvantage of porcelain teeth regarding adjustment?", o: ["They are too soft", "They are easy to adjust", "Grinding removes the surface glaze and is difficult to reshape", "They are too light"], a: 2, e: "Grinding porcelain removes the surface glaze, and it is difficult to reshape after grinding." }
            ]},
            { id: 9, title: "Support & Occlusal Rests", questions: [
                { q: "What is the definition of \"support\" in RPD?", o: ["Resistance to dislodging forces", "Resistance to tissue-ward movement (vertical forces toward mucosa and bone)", "Resistance to horizontal forces", "Resistance to rotational forces"], a: 1, e: "Support is the resistance to tissue-ward movement (forces directed toward the mucosa and bone)." },
                { q: "What is the main goal of support?", o: ["To make the denture heavy", "To distribute forces over the supporting structure to decrease force per unit area", "To increase force on one tooth", "To make the denture loose"], a: 1, e: "The main goal of support is to distribute the forces over the supporting structure to decrease force per unit area." },
                { q: "What is a \"rest\" in RPD terminology?", o: ["A flexible part of the clasp", "A rigid unit that rests upon a tooth surface to provide vertical tooth support", "The denture base", "The major connector"], a: 1, e: "An occlusal rest is any rigid unit of a partial denture that rests upon a tooth surface for the purpose of providing vertical tooth support." },
                { q: "What is a \"rest seat\"?", o: ["The clasp arm", "The prepared recess in a tooth or restoration created to receive the rest", "The denture base", "The major connector"], a: 1, e: "The rest seat is the prepared recess (hole) in a tooth or restoration created to receive the rest." },
                { q: "What happens to a partial denture that has no occlusal rests?", o: ["It is called a \"gum stripper\"", "It has better retention", "It is more comfortable", "It lasts longer"], a: 0, e: "A partial denture without occlusal rests is called a \"gum stripper\" because it damages the gums." },
                { q: "How should the rest transmit stress to the abutment tooth?", o: ["Horizontally", "Along the long axis of the tooth", "Away from the tooth", "Only to the gum"], a: 1, e: "The rest must transmit stress along the long axis of the tooth." },
                { q: "What is the recommended angle between the rest and the minor connector?", o: ["90 degrees or more", "Less than 90 degrees (acute angle)", "Exactly 180 degrees", "Any angle is acceptable"], a: 1, e: "The angle formed between the minor connector and the occlusal rest must be less than 90 degrees (an acute angle)." },
                { q: "What is one function of an occlusal rest?", o: ["To increase tooth mobility", "To prevent extrusion (movement out of the socket) of abutment teeth", "To cause food trapping", "To weaken the abutment"], a: 1, e: "Functions of rests include preventing abutment teeth from moving out of their sockets (extrusion)." },
                { q: "What shape should the floor of a rest seat be?", o: ["Flat", "Convex", "Spoon-shaped (concave)", "Irregular"], a: 2, e: "The floor of the rest seat must be spoon-shaped (concave) and inclined apically." },
                { q: "A cingulum rest is placed on which tooth surface?", o: ["Occlusal surface of molars", "Lingual surface of anterior teeth (canines)", "Buccal surface of premolars", "Incisal edge of incisors"], a: 1, e: "A cingulum rest contacts the natural or prepared cingulum of an anterior tooth (usually canines)." },
                { q: "An incisal rest contacts the tooth at the:", o: ["Cervical margin", "Middle of the crown", "Incisal edge", "Root surface"], a: 2, e: "An incisal rest is a rigid extension that contacts the tooth at the incisal edge." },
                { q: "Why is a lingual rest preferable to an incisal rest?", o: ["It is easier to prepare", "It is more esthetic and comfortable for the tongue", "It is stronger", "It never wears"], a: 1, e: "A lingual rest is preferable to an incisal rest because it is more esthetic (hidden) and less bothersome to the tongue." },
                { q: "What is the minimum thickness of a rest to avoid metal distortion or fracture?", o: ["0.5 mm", "1.0 mm", "1.25 mm", "2.0 mm"], a: 2, e: "The minimum thickness of a rest is 1.25 mm (to avoid metal distortion or fracture)." },
                { q: "What is an \"onlay\" in relation to rests?", o: ["A small rest", "An enlarged occlusal rest that covers the whole occlusal surface", "A flexible rest", "A plastic rest"], a: 1, e: "An onlay functions as an enlarged occlusal rest that covers the whole occlusal surface and extends both buccally and lingually." },
                { q: "In a free-end saddle case, where should the occlusal rest be placed?", o: ["Distally (on the back of the tooth)", "Mesially (on the front of the tooth)", "Buccally", "Lingually"], a: 1, e: "In free-end saddle cases, the rest is usually placed mesially to reduce leverage on the abutment tooth." },
                { q: "What is the function of a rest regarding food?", o: ["To trap food", "To prevent ingress (trapping) of food between the tooth and the clasp", "To push food into the gums", "To attract food"], a: 1, e: "One function of the rest is to prevent ingress (trapping) of food between the tooth and the clasp." },
                { q: "What does \"positive seat\" mean for a rest?", o: ["The rest is loose", "The rest locks in place and does not slip", "The rest is flexible", "The rest is made of plastic"], a: 1, e: "The rest seat must be positive, meaning the rest locks in place and does not slip." },
                { q: "What instrument is used to prepare a rest seat on an existing PFM (porcelain-fused-to-metal) crown?", o: ["Steel bur", "Diamond bur only", "Carbide bur", "Inverted cone bur"], a: 1, e: "On existing PFM crowns, only a diamond bur should be used to avoid perforation of the porcelain." },
                { q: "What is the junction between the rest and minor connector should be?", o: ["Sharp", "Rounded", "Flat", "Pointed"], a: 1, e: "The junction especially at the junction with the minor connector should be rounded to avoid stress concentration." },
                { q: "What should you do before preparing a rest seat to avoid removing centric contacts?", o: ["Extract the tooth", "Mark existing centric and excursive contacts with articulating paper", "Remove all enamel", "Prepare blindly"], a: 1, e: "You should mark existing centric and excursive contacts with articulating paper prior to preparation to avoid removing centric contacts." }
            ]},
            { id: 10, title: "Rest Seats Preparation", questions: [
                { q: "What should you do before starting rest seat preparation?", o: ["Extract the tooth immediately", "Mark existing contacts with articulating paper", "Anesthetize the patient without checking occlusion", "Start cutting randomly"], a: 1, e: "Mark existing centric and excursive contacts with articulating paper prior to preparation." },
                { q: "When preparing a rest seat, what should you avoid doing to centric contacts?", o: ["Preserving them", "Removing them when possible", "Marking them", "Ignoring them"], a: 1, e: "Avoid removing centric contacts when possible during rest seat preparation." },
                { q: "Why should you avoid creating undercuts during rest seat preparation?", o: ["To make the tooth weaker", "To allow the metal framework to seat and be removed smoothly", "To increase retention", "To make the tooth sharper"], a: 1, e: "Avoid creating undercuts during preparation to allow the metal framework to seat and be removed smoothly." },
                { q: "Which bur is used to create the general outline form of a cingulum rest?", o: ["Round bur", "Flamed shape bur (at 45 degrees)", "Inverted cone bur", "Straight fissure bur"], a: 1, e: "A flamed shape bur (at 45°) is used to create the general outline form of a cingulum rest." },
                { q: "Which bur is used to create the positive rest seat for a cingulum rest?", o: ["Flamed shape bur", "Inverted cone shape bur", "Round bur", "Tapered fissure bur"], a: 1, e: "An inverted cone shape bur is used to create the positive rest seat for a cingulum rest." },
                { q: "What are the requirements for a positive incisal rest?", o: ["One plane preparation only", "Two planes preparation (incisal plane and labial plane) with concave MD and convex BL contour", "Flat surface only", "No contour requirements"], a: 1, e: "Positive incisal rest requires two planes preparation (incisal and labial) with concave mesiodistally and convex buccolingually." },
                { q: "What is the recommended width of an incisal rest?", o: ["The full incisal width", "1/3 of the mesiodistal incisal width", "1/2 of the mesiodistal width", "2/3 of the mesiodistal width"], a: 1, e: "The width of an incisal rest should be 1/3 of the MD incisal width." },
                { q: "Which burs are used for posterior rest seat preparation?", o: ["#2 round burs only", "#4, #6, or #8 round burs (depending on tooth size)", "Inverted cone burs only", "Flame burs only"], a: 1, e: "Posterior rest seats are prepared using #4, #6, or #8 round burs depending on the tooth size." },
                { q: "What is the shape of a posterior rest seat?", o: ["Flat", "Saucer-shaped or spoon-shaped", "V-shaped", "U-shaped"], a: 1, e: "The shape of a posterior rest seat is saucer-shaped or spoon-shaped." },
                { q: "What is the disadvantage of an incisal rest?", o: ["It is very retentive", "It is unesthetic and bothersome to the tongue", "It is very strong", "It never wears"], a: 1, e: "An incisal rest is unesthetic and can be bothersome to the tongue because the minor connector is visible and the tongue contacts it." },
                { q: "Which anterior tooth is preferred for a cingulum rest?", o: ["Lateral incisor", "Central incisor", "Canine", "Any anterior tooth equally"], a: 2, e: "A canine is always preferred over an incisor for a cingulum rest. If canines are absent, multiple lingual rests are prepared on several anterior teeth." },
                { q: "What instrument should you use to prepare a rest seat on an existing PFM crown?", o: ["Steel bur", "Diamond bur only", "Carbide bur", "Inverted cone bur"], a: 1, e: "On existing PFM crowns, use a diamond bur only to avoid perforation, and inform the patient in advance." },
                { q: "What should you use to verify rest seat thickness intraorally?", o: ["Articulating paper", "Baseplate wax", "Dental floss", "Cotton roll"], a: 1, e: "Check the rest prep thickness with baseplate wax intraorally at both centric and excursive positions." },
                { q: "Where are posterior rest seats usually located in free-end saddle cases?", o: ["Distally", "Mesially", "Lingually", "Buccally"], a: 1, e: "In free-end saddle cases, posterior rest seats are usually placed mesially." },
                { q: "Why should the rest seat be inclined apically?", o: ["To make it shallower", "To direct forces along the long axis and prevent slipping", "To increase tooth mobility", "To weaken the tooth"], a: 1, e: "The floor of the rest seat should be inclined apically so that forces are directed along the long axis and the rest does not slip." },
                { q: "What is the junction between the rest and minor connector should be?", o: ["Sharp (90-degree angle)", "Rounded", "Flat", "Pointed"], a: 1, e: "The junction between the rest and minor connector should be rounded, especially to avoid stress concentration." },
                { q: "What is the shape of an anterior circular concave rest?", o: ["Flat", "Concave", "Convex", "Irregular"], a: 1, e: "An anterior circular concave rest is prepared using #2 or #4 round burs." },
                { q: "What is the purpose of using an inverted cone bur for a cingulum rest?", o: ["To make the rest flat", "To create a positive rest seat that locks in place", "To remove enamel", "To polish the tooth"], a: 1, e: "The inverted cone bur is used to create the positive rest seat so the rest locks in place and does not slip." },
